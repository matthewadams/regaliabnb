name: Decode review cards

on:
  push:
    paths:
      - 'review-cards/**.png.b64'

permissions:
  contents: write

jobs:
  decode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Decode base64 cards to PNG
        run: |
          shopt -s nullglob
          files=(review-cards/*.png.b64)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No .png.b64 files to decode."
            exit 0
          fi
          for f in "${files[@]}"; do
            out="review-cards/$(basename "$f" .b64)"
            echo "Decoding $f -> $out"
            base64 -d "$f" > "$out"
            git rm --quiet "$f"
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add review-cards/*.png
          git commit -m "Decode review cards to PNG [skip ci]"
          git push
